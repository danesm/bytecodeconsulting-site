<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline | Bytecode Consulting</title>
    <meta name="theme-color" content="#020617" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 30%),
          radial-gradient(circle at top right, rgba(6, 182, 212, 0.12), transparent 28%),
          linear-gradient(180deg, #020617 0%, #020817 48%, #020617 100%);
        color: #fff;
      }

      .panel {
        width: 100%;
        max-width: 560px;
        padding: 32px;
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.86), rgba(15, 23, 42, 0.64));
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.55);
      }

      .eyebrow {
        display: inline-flex;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(6, 182, 212, 0.1);
        border: 1px solid rgba(6, 182, 212, 0.2);
        color: #a5f3fc;
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 20px 0 0;
        font-size: 36px;
        line-height: 1.15;
      }

      p {
        margin: 18px 0 0;
        color: #cbd5e1;
        line-height: 1.8;
        font-size: 16px;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        padding: 14px 20px;
        border-radius: 999px;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(90deg, #2563eb, #06b6d4, #7c3aed);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="eyebrow">Offline</div>
      <h1>You&apos;re offline right now.</h1>
      <p>
        Bytecode Consulting is still installed, but this page needs a connection to load fresh content.
        Reconnect and try again, or return to the homepage once you&apos;re back online.
      </p>
      <a href="/">Back to homepage</a>
    </main>
  </body>
</html>
